<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Room</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<main class="room-page">
    <header class="room-header">
        <div>
            <h1 id="roomTitle" class="room-title">Poker Room</h1>
            <p id="roomInfo" class="room-subtitle"></p>
        </div>
    </header>

    <section class="stats-grid">
        <article class="card">
            <h2 class="card-title">Game State</h2>
            <div id="gameState" class="stats-list">
                <p id="phaseText">Phase: -</p>
                <p id="potText">Pot: -</p>
                <p id="currentBetText">Current Bet: -</p>
                <p id="currentPlayerText">Current Player: -</p>
            </div>
        </article>

        <article class="card">
            <h2 class="card-title">Your Stack</h2>
            <div id="chipCount" class="chip-count">Loading chips...</div>
        </article>
    </section>

    <section class="table-card">
        <div class="poker-table">
            <div class="table-surface">
                <div class="table-center">
                    <div class="table-pot" id="tablePotDisplay">Pot</div>

                    <div id="communityCards" class="community-cards">
                        <div class="community-card hidden-card"></div>
                        <div class="community-card hidden-card"></div>
                        <div class="community-card hidden-card"></div>
                        <div class="community-card hidden-card"></div>
                        <div class="community-card hidden-card"></div>
                    </div>
                </div>
                <div id="bet0" class="table-bet"></div>
                <div id="bet1" class="table-bet"></div>
                <div id="bet2" class="table-bet"></div>
                <div id="bet3" class="table-bet"></div>
                <div id="bet4" class="table-bet"></div>
                <div id="bet5" class="table-bet"></div>
                <div id="bet6" class="table-bet"></div>
                <div id="bet7" class="table-bet"></div>
                <div id="bet8" class="table-bet"></div>
                <div id="bet9" class="table-bet"></div>
                <div id="check0" class="table-check"></div>
                <div id="check1" class="table-check"></div>
                <div id="check2" class="table-check"></div>
                <div id="check3" class="table-check"></div>
                <div id="check4" class="table-check"></div>
                <div id="check5" class="table-check"></div>
                <div id="check6" class="table-check"></div>
                <div id="check7" class="table-check"></div>
                <div id="check8" class="table-check"></div>
                <div id="check9" class="table-check"></div>
            </div>

            <div class="seat seat-0"><div id="seat0" class="seat-label">Seat 1</div></div>
            <div class="seat seat-1"><div id="seat1" class="seat-label">Seat 2</div></div>
            <div class="seat seat-2"><div id="seat2" class="seat-label">Seat 3</div></div>
            <div class="seat seat-3"><div id="seat3" class="seat-label">Seat 4</div></div>
            <div class="seat seat-4"><div id="seat4" class="seat-label">Seat 5</div></div>
            <div class="seat seat-5"><div id="seat5" class="seat-label">Seat 6</div></div>
            <div class="seat seat-6"><div id="seat6" class="seat-label">Seat 7</div></div>
            <div class="seat seat-7"><div id="seat7" class="seat-label">Seat 8</div></div>
            <div class="seat seat-8"><div id="seat8" class="seat-label">Seat 9</div></div>
            <div class="seat seat-9"><div id="seat9" class="seat-label">Seat 10</div></div>
        </div>
    </section>

    <section class="card action-card">
        <div class="card-header">
            <h2 class="card-title">Actions</h2>
        </div>

        <div class="action-row">
            <button id="startRoundButton">Start Round</button>
            <button id="resetChipsButton">Reset Chips</button>
        </div>

        <div class="action-row">
            <button id="preCheckFoldButton" type="button">Check/Fold</button>
            <!--
            <button id="checkFoldButton">Check / Fold</button>
            -->
            <button id="checkButton">Check</button>
            <button id="bet50Button">Bet 50</button>
            <button id="bet100Button">Bet 100</button>
            <button id="callButton">Call</button>
            <button id="foldButton">Fold</button>

        </div>

        <div class="bet-form-controls">
            <button id="decrementBetButton" class="tune-btn" type="button">–</button>

            <div class="slider-wrapper">
                <input id="betRaiseSlider" type="range" min="0" max="1000" value="50" step="5">
            </div>

            <button id="incrementBetButton" class="tune-btn" type="button">+</button>

            <input id="betRaiseNumberInput" class="bet-amount-input" type="number" min="0" max="1000" step="5" value="50">
            <button id="betRaiseActionButton">Bet 50</button>
        </div>

        <div id="showdownSection" style="display: none;">
            <label for="winnerSelect">Winner</label>
            <select id="winnerSelect"></select>
            <button id="resolveShowdownButton">Award Pot</button>
        </div>

        <div class="bet-presets">
            <button id="preset0Button" type="button">0</button>
            <button id="preset1BbButton" type="button">0</button>
            <button id="preset2BbButton" type="button">0</button>
            <button id="preset5BbButton" type="button">0</button>
            <button id="preset10BbButton" type="button">0</button>
            <button id="preset20BbButton" type="button">0</button>
            <button id="preset30BbButton" type="button">0</button>
            <button id="preset40BbButton" type="button">0</button>
            <button id="preset50BbButton" type="button">0</button>
            <button id="preset100BbButton" type="button">0</button>
            <button id="allInButton" type="button">All-in</button>
        </div>
    </section>

    <section class="content-grid">
        <article class="card">
            <div class="card-header">
                <h2 class="card-title">Players</h2>
            </div>
            <ul id="playerList" class="player-list"></ul>
        </article>

        <article class="card">
            <div class="card-header">
                <h2 class="card-title">Waiting Players</h2>
            </div>
            <ul id="waitingPlayersList" class="player-list muted-list"></ul>
        </article>
    </section>

    <div id="hostChipsSection" style="display: none;">
        <h3>Set Chips</h3>

        <label for="hostPlayerSelect">Player</label>
        <select id="hostPlayerSelect"></select>

        <label for="hostChipsInput">Chips</label>
        <input id="hostChipsInput" type="number" min="0" placeholder="Chips">

        <button id="setPlayerChipsButton">Set Chips</button>
    </div>

    <div id="hostKickSection" style="display: none;">
        <h3>Kick Player</h3>
        <select id="kickPlayerSelect"></select>
        <button id="kickPlayerButton" type="button">Kick</button>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/room.js"></script>
<script src="room.js"></script>
</body>
</html>
