<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Rooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
    <h1>Poker Chips</h1>
    <p class="app-description">This app tracks chips only. Use it alongside physical cards at the table.</p>

    <section>
        <label for="playerNameInput">Your Name</label>
        <input id="playerNameInput" type="text" />
    </section>

    <section>
        <h3>Create Room</h3>
        <button id="createRoomButton">Create Room</button>
    </section>

    <section>
        <h3>Join Room</h3>
        <label for="joinRoomCodeInput">Room Code</label>
        <input id="joinRoomCodeInput" type="text" />
        <button id="joinRoomButton">Join Room</button>
    </section>

    <section id="statusMessageSection" style="display: none;">
        <p id="statusMessage"></p>
    </section>
</main>

<script src="index.js"></script>
</body>
</html>
