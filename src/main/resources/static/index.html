<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poker Night</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Poker Room</h1>

<div id="table">
    POKER TABLE
</div>

<div id="my_chips">Loading chips...</div>

<div class="player">
    <label for="player_name_input">Player Name</label>
    <input id="player_name_input" type="text"/>
    <button id="player_name_btn">Use</button>
</div>

<div class="controls">
    <button id="bet50">Bet 50</button>
    <button id="bet100">Bet 100</button>
    <button id="reset_btn">Reset Chips</button>
    <button id="create_btn">Create Player</button>
    <button id="delete_players_btn">Delete Players</button>
</div>

<div style="margin-top: 12px;">
    <label for="delete_player_input">Delete player:</label>
    <input id="delete_player_input" type="text"/>
    <button id="delete_player_btn">Delete</button>
    <p id="delete_status"></p> <!-- Shows status in text field-->
</div>

<ul id="player_list"></ul>

<script src="app.js"></script>

</body>
</html>
