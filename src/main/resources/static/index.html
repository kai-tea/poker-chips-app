<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poker Night</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Poker Room</h1>

<div id="table">
    POKER TABLE
</div>

<div id="my_chips">Loading chips...</div>

<div class="player">
    <label for="player_name">Player Name</label>
    <input id="player_name" type="text"/>
    <button id="set_player">Use</button>
</div>

<div class="controls">
    <button id="bet50">Bet 50</button>
    <button id="bet100">Bet 100</button>
    <button id="reset_btn">Reset Chips</button>
    <button id="create_btn">Create Player</button>
    <button id="delete_players">Delete Players</button>
</div>

<ul id="player_list"></ul>

<script src="app.js"></script>

</body>
</html>
